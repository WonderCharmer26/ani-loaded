name: Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: App/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: App/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run
        env:
          VITE_API_BASE_URL: http://localhost:5173
          VITE_BACKEND_URL: http://localhost:8000
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_KEY: placeholder
          VITE_SUPABASE_BUCKET: placeholder
          VITE_SUPABASE_FOLDER: placeholder
          VITE_SUPABASE_FOLDER2: placeholder

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: App/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: App/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_KEY: placeholder
          STORAGE_KEY_DISCUSSION: placeholder
